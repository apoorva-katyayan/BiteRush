services:
  - type: web
    name: biterush-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: Biterush
      - key: APP_ENV
        value: production
      - key: APP_KEY
        sync: false
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://biterush-backend.onrender.com
      - key: APP_LOCALE
        value: en
      - key: APP_FALLBACK_LOCALE
        value: en
      - key: APP_FAKER_LOCALE
        value: en_US
      - key: APP_MAINTENANCE_DRIVER
        value: file
      - key: BCRYPT_ROUNDS
        value: '10'
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_STACK
        value: single
      - key: LOG_DEPRECATIONS_CHANNEL
        value: null
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: mongodb
      - key: MONGO_DSN
        sync: false
      - key: MONGO_DATABASE
        value: biterush
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_LIFETIME
        value: '120'
      - key: SESSION_ENCRYPT
        value: 'false'
      - key: SESSION_PATH
        value: /
      - key: SESSION_DOMAIN
        value: null
      - key: BROADCAST_CONNECTION
        value: log
      - key: FILESYSTEM_DISK
        value: local
      - key: QUEUE_CONNECTION
        value: sync
      - key: CACHE_STORE
        value: file
      - key: ADMIN_EMAIL
        value: admin@biterush.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""
      - key: RAZORPAY_KEY_ID
        value: rzp_test_SsWlvIKBYfOZVd
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CURRENCY
        value: INR
    autoDeployTrigger: commit
    disk:
      name: storage
      mountPath: /var/www/storage
      sizeGB: 1

  - type: web
    name: biterush-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: biterush-backend
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    autoDeployTrigger: commit

  - type: web
    name: biterush-admin
    runtime: static
    rootDir: admin
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: biterush-backend
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    autoDeployTrigger: commit
