services:
  - type: web
    name: biterush-backend
    env: php
    plan: free
    buildCommand: |
      composer install
      php artisan key:generate
      npm install
      npm run build
    startCommand: php artisan serve --host 0.0.0.0 --port 10000
    envVars:
      - key: APP_NAME
        value: Biterush
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: base64:733tNte8g+tpMPv2SL+Bru5EA6yxNLXuwPK29O9Xj8Q=
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://REPLACE_WITH_YOUR_RENDER_URL
      - key: APP_LOCALE
        value: en
      - key: APP_FALLBACK_LOCALE
        value: en
      - key: APP_FAKER_LOCALE
        value: en_US
      - key: APP_MAINTENANCE_DRIVER
        value: file
      - key: BCRYPT_ROUNDS
        value: '10'
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_STACK
        value: single
      - key: LOG_DEPRECATIONS_CHANNEL
        value: null
      - key: LOG_LEVEL
        value: debug
      - key: DB_CONNECTION
        value: mongodb
      - key: MONGO_DSN
        value: mongodb+srv://apoorva:AnmWz9zfLbRuqTFn@foodapp.s2c3n3v.mongodb.net/
      - key: MONGO_DATABASE
        value: biterush
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_LIFETIME
        value: '120'
      - key: SESSION_ENCRYPT
        value: 'false'
      - key: SESSION_PATH
        value: /
      - key: SESSION_DOMAIN
        value: null
      - key: BROADCAST_CONNECTION
        value: log
      - key: FILESYSTEM_DISK
        value: local
      - key: QUEUE_CONNECTION
        value: sync
      - key: CACHE_STORE
        value: file
      - key: ADMIN_EMAIL
        value: admin@biterush.com
      - key: ADMIN_PASSWORD
        value: admin123
      - key: JWT_SECRET
        value: biterush_local_development_jwt_secret_key_2026_please_change_in_production
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
